name: 每週研究圖文（草稿→審核後發佈）

on:
  schedule:
    - cron: "0 9 * * 5"   # 週五 17:00 台灣時間（週收盤後）
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-research
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 產生每週草稿（FinMind；資料不足則 SystemExit 不發佈）
        run: python3 research/_gen/gen_daily.py weekly
      - name: 開草稿 PR（合併才公開）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          STUB=$(cat pr_date.txt); BRANCH="daily/$STUB"
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research
          if git diff --cached --quiet; then echo "無新內容"; exit 0; fi
          git checkout -b "$BRANCH"
          git commit -m "每週研究草稿 $STUB（待審核）"
          git push -f origin "$BRANCH"
          PREVIEW="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${BRANCH}/research/${STUB}.html"
          { echo "🔍 **預覽渲染版**：$PREVIEW"; echo; cat pr_body.md; } > /tmp/body.md
          gh pr create --base main --head "$BRANCH" --title "📝 每週研究草稿 $STUB（審核後合併才公開）" --body-file /tmp/body.md \
          || gh pr edit "$BRANCH" --title "📝 每週研究草稿 $STUB（審核後合併才公開）" --body-file /tmp/body.md
