name: 每日研究圖文（自動發佈）

on:
  schedule:
    # 16:00 台灣時間（平日，收盤後資料已結算）= 08:00 UTC
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}   # 也可手動觸發

permissions:
  contents: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v4

      - name: 產生當日研究圖文（TWSE/TPEx 官方資料）
        run: python3 research/_gen/gen_daily.py

      - name: 提交並發佈到 GitHub Pages
        run: |
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/
          if git diff --cached --quiet; then
            echo "今日無新內容，略過提交。"
          else
            git commit -m "每日研究圖文：自動發佈 $(date -u +%Y-%m-%d)"
            git push
          fi
