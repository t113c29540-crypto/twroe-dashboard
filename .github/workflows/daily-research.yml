name: 每日研究圖文（草稿→審核後發佈）

on:
  schedule:
    # 16:00 台灣時間（平日，收盤後）= 08:00 UTC
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v4

      - name: 產生當日草稿（TWSE 擋雲端IP，改用 FinMind；資料不足會 SystemExit 不發佈）
        run: python3 research/_gen/gen_daily.py

      - name: 開草稿 Pull Request（合併才公開，不直接發佈）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          DATE=$(cat pr_date.txt)
          BRANCH="daily/$DATE"
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research
          if git diff --cached --quiet; then
            echo "今日無新內容，略過。"; exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "每日研究草稿 $DATE（待審核）"
          git push -f origin "$BRANCH"
          PREVIEW="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${BRANCH}/research/${DATE}.html"
          { echo "🔍 **預覽渲染版（審核用）**：$PREVIEW"; echo; cat pr_body.md; } > /tmp/body.md
          gh pr create --base main --head "$BRANCH" \
            --title "📝 每日研究草稿 $DATE（審核後合併才公開）" \
            --body-file /tmp/body.md \
          || gh pr edit "$BRANCH" --title "📝 每日研究草稿 $DATE（審核後合併才公開）" --body-file /tmp/body.md
          echo "✓ 已開/更新草稿 PR：$BRANCH"
