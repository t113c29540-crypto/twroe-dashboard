name: 每日研究圖文（自動發佈）

on:
  schedule:
    - cron: "0 8 * * 1-5"   # 16:00 台灣時間（平日，收盤後）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 產生當日研究（FinMind；資料不足則 SystemExit 不發佈）
        run: python3 research/_gen/gen_daily.py
      - name: 直接發佈到 GitHub Pages
        run: |
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research
          if git diff --cached --quiet; then echo "今日無新內容，略過。"; exit 0; fi
          git commit -m "每日研究：自動發佈 $(cat pr_date.txt 2>/dev/null) [skip ci]"
          git pull --rebase origin main
          git push
