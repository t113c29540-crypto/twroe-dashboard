name: 全球股市資料（自動更新 global.json）

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC（美股收盤後；歐股當日亦已收）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: global-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝 yfinance
        run: pip install --quiet yfinance
      - name: 抓全球股市（現價＋ROE/PE/PB）
        run: python3 research/_gen/fetch_global.py
      - name: 直接更新 global.json（資料檔，非研究內容，免審核）
        run: |
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/_gen/global.json
          if git diff --cached --quiet; then echo "無變更"; exit 0; fi
          git commit -m "全球股市資料更新 $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
