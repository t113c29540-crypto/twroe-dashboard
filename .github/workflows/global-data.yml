name: 全球股市資料（自動更新 global.json）

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC（美股收盤後；歐股當日亦已收）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: global-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝 yfinance
        run: pip install --quiet yfinance
      - name: 抓全球股市（現價＋ROE/近年一致性）
        run: python3 research/_gen/fetch_global.py
      - name: 抓台股+全球 ETF 排名（規模/殖利率/YTD）
        run: python3 research/_gen/fetch_etf.py || echo "ETF 抓取失敗，保留上一版"
      - name: 抓加密貨幣前50（CoinGecko）
        run: python3 research/_gen/fetch_crypto.py || echo "加密抓取失敗，保留上一版"
      - name: 抓期貨/美債殖利率/債券ETF（Yahoo）
        run: python3 research/_gen/fetch_macro.py || echo "期貨債券抓取失敗，保留上一版"
      - name: 直接更新資料檔（非研究內容，免審核）
        run: |
          git config user.name "twroe-research-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/_gen/global.json research/_gen/etf.json research/_gen/crypto.json research/_gen/macro.json
          if git diff --cached --quiet; then echo "無變更"; exit 0; fi
          git commit -m "全球+ETF+加密+期貨債券資料更新 $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
