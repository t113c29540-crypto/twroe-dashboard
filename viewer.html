<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;   /* 圖表面 */
    --page:      #f9f9f7;
    --ink:       #0b0b0b;
    --ink-2:     #52514e;
    --muted:     #898781;
    --grid:      #e1e0d9;
    --baseline:  #c3c2b7;
    --border:    rgba(11,11,11,0.10);
    --series-1: #2a78d6; --series-2: #1baf7a; --series-3: #eda100;
    --series-4: #008300; --series-5: #4a3aa7; --series-6: #e34948;
    --seq-450:  #2a78d6; --seq-250: #86b6ef; --seq-150: #b7d3f6;
    --good:     #0ca30c; --warn: #fab219; --serious: #ec835a;
    --good-text:#006300;
    --context:  #b9b7ae;  /* 未選取序列的弱化線 */
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1: #1a1a19; --page: #0d0d0d;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
      --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500;
      --series-4: #008300; --series-5: #9085e9; --series-6: #e66767;
      --seq-450: #3987e5; --seq-250: #1c5cab; --seq-150: #184f95;
      --good-text: #0ca30c;
      --context: #4a4a46;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #1a1a19; --page: #0d0d0d;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500;
    --series-4: #008300; --series-5: #9085e9; --series-6: #e66767;
    --seq-450: #3987e5; --seq-250: #1c5cab; --seq-150: #184f95;
    --good-text: #0ca30c;
    --context: #4a4a46;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.55 system-ui, -apple-system, "Segoe UI", "PingFang TC",
          "Microsoft JhengHei", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 14px 20px 0;
  }
  header h1 { font-size: 17px; font-weight: 650; margin: 0; }
  header .src { color: var(--muted); font-size: 12px; }
  nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
  nav button, .btn {
    border: 1px solid var(--border); background: var(--surface-1);
    color: var(--ink-2); border-radius: 8px; padding: 6px 14px;
    font: inherit; font-size: 13px; cursor: pointer;
  }
  nav button[aria-selected="true"] { color: var(--ink); font-weight: 650;
    border-color: var(--baseline); box-shadow: inset 0 -2px 0 var(--seq-450); }
  nav button:hover, .btn:hover { color: var(--ink); }
  main { padding: 14px 20px 8px; }
  section[hidden] { display: none; }
  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .card h2 { font-size: 14px; font-weight: 650; margin: 0 0 2px; }
  .card .sub { color: var(--muted); font-size: 12px; margin: 0 0 10px; }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 0 0 10px; }
  .toolbar .gap { flex: 1; }
  .hint { color: var(--muted); font-size: 12px; }
  /* 股票 chips（兼作圖例：色鍵短線 + 名稱） */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 999px;
    background: transparent; color: var(--ink-2);
    padding: 4px 12px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .chip .key { width: 14px; height: 0; border-top: 3px solid var(--context); border-radius: 2px; }
  .chip[aria-pressed="true"] { color: var(--ink); border-color: var(--baseline); font-weight: 600; }
  .chip:hover { color: var(--ink); }
  /* 圖表 */
  .chartwrap { position: relative; }
  .chartwrap svg { display: block; width: 100%; touch-action: none; border-radius: 8px; }
  .chartwrap svg:focus-visible { outline: 2px solid var(--seq-450); outline-offset: 2px; }
  .tooltip {
    position: absolute; pointer-events: none; z-index: 5; display: none;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; box-shadow: 0 4px 16px rgba(0,0,0,.14);
    font-size: 12.5px; min-width: 130px;
  }
  .tooltip .tt-title { color: var(--muted); margin-bottom: 4px; }
  .tooltip .tt-row { display: flex; align-items: center; gap: 7px; padding: 1px 0; }
  .tooltip .tt-key { width: 12px; height: 0; border-top: 3px solid; border-radius: 2px; flex: none; }
  .tooltip .tt-val { font-weight: 650; font-variant-numeric: tabular-nums; }
  .tooltip .tt-name { color: var(--ink-2); }
  /* 表格 */
  .tblwrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 6px 10px; text-align: right; white-space: nowrap;
    font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--grid); }
  th { color: var(--ink-2); font-weight: 600; cursor: pointer; user-select: none;
    position: sticky; top: 0; background: var(--surface-1); }
  th .arrow { color: var(--muted); font-size: 10px; }
  th:first-child, td:first-child, th.lft, td.lft { text-align: left; }
  tbody tr:hover { background: color-mix(in srgb, var(--seq-450) 6%, transparent); }
  tbody tr.click { cursor: pointer; }
  td .bar { display: inline-block; vertical-align: middle; height: 8px;
    border-radius: 0 4px 4px 0; background: var(--seq-450); margin-right: 6px; }
  td .barbox { display: inline-flex; align-items: center; width: 110px; }
  /* 估值狀態 chip：圖示＋文字，非僅顏色 */
  .status { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; white-space: nowrap; }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .status.buy  .dot { background: var(--good); }
  .status.fair .dot { background: var(--muted); }
  .status.wait .dot { background: var(--serious); }
  /* 價格位置軌道 */
  .track { position: relative; width: 130px; height: 14px; display: inline-block; vertical-align: middle; }
  .track .rail { position: absolute; left: 0; right: 0; top: 6px; height: 3px;
    background: var(--grid); border-radius: 2px; }
  .track .tick { position: absolute; top: 3px; width: 1px; height: 9px; background: var(--baseline); }
  .track .pin { position: absolute; top: 3px; width: 9px; height: 9px; border-radius: 50%;
    background: var(--ink); border: 2px solid var(--surface-1); transform: translateX(-50%); }
  /* 現價超出軌道量程時改畫三角箭頭，明示「超出刻度」而非停在端點 */
  .track .pin.over, .track .pin.under { width: 0; height: 0; background: none; border-radius: 0;
    border-top: 5px solid transparent; border-bottom: 5px solid transparent; transform: none; }
  .track .pin.over  { border-left: 9px solid var(--ink); border-right: none; right: -3px; left: auto; }
  .track .pin.under { border-right: 9px solid var(--ink); border-left: none; left: -3px; }
  footer { color: var(--muted); font-size: 12px; padding: 8px 20px 20px; }
  .err { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    margin: 40px auto; max-width: 560px; padding: 24px; }
  kbd { border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; font-size: 11px; }
</style>

<script>

      else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);

    const draw = () => {
      const sorted = rows.slice();
      if (sortKey != null) {
        const col = cols.find(c => c.key === sortKey);
        sorted.sort((a, b) => {
          let x = a[sortKey], y = b[sortKey];
          if (col.num) { x = (x == null) ? -Infinity : +x; y = (y == null) ? -Infinity : +y; return asc ? x - y : y - x; }
          return asc ? String(x).localeCompare(String(y), 'zh-Hant') : String(y).localeCompare(String(x), 'zh-Hant');
        });
      }
      tbody.replaceChildren();
      for (const r of sorted) {
        const tr = el('tr');
        for (const c of cols) {
          const td = el('td', c.left ? { class: 'lft' } : {});
          const out = c.render ? c.render(r) : fmt(r[c.key], c.dec);
          if (out instanceof Node) td.append(out); else td.textContent = out;
          tr.append(td);
        }
        if (opts && opts.onRow) { tr.classList.add('click'); tr.addEventListener('click', () => opts.onRow(r)); }
        tbody.append(tr);
      }
      for (const c of cols) c.th.querySelector('.arrow').textContent =
        c.key === sortKey ? (asc ? ' ▲' : ' ▼') : '';
    };
    for (const c of cols) {
      const th = el('th', c.left ? { class: 'lft' } : {}, el('span', { text: c.label }), el('span', { class: 'arrow' }));
      th.addEventListener('click', () => {
        if (sortKey === c.key) asc = !asc; else { sortKey = c.key; asc = !c.num; }
        draw();
      });
      c.th = th; trh.append(th);
    }
    thead.append(trh); table.append(thead, tbody); wrap.append(table);
    if (opts && opts.initKey) { asc = !(cols.find(c => c.key === opts.initKey) || {}).num ? true : true; }
    draw();
    return wrap;
  }

  // ---------- 縮放式折線圖引擎 ----------
  // series: [{name, color(css var name)|'context', values:[{x,y}...], width}]
  // bands:  [{color, lo:[{x,y}], hi:[{x,y}]}]
  // refs:   [{y, label, color}]
  function zoomChart(opts) {
    const wrap = el('div', { class: 'chartwrap' });
    const svg = svgEl('svg', { tabindex: '0', role: 'img', 'aria-label': opts.ariaLabel || '互動圖表' });
    const tip = el('div', { class: 'tooltip' });
    wrap.append(svg, tip);
    const M = { t: 20, r: opts.rightPad ?? 96, b: 30, l: 48 };
    const H = opts.height || 380;
    const full = opts.xExtent.slice(); // [x0,x1]
    let dom = full.slice();
    let W = 800;
    let state = { series: [], bands: [], refs: [], yLabel: opts.yLabel || '' };

    const xTo = x => M.l + (x - dom[0]) / (dom[1] - dom[0]) * (W - M.l - M.r);
    const xFrom = px => dom[0] + (px - M.l) / (W - M.l - M.r) * (dom[1] - dom[0]);

    function niceTicks(a, b, n) {
      const span = b - a; if (span <= 0) return [a];
      const step0 = span / Math.max(1, n);
      const mag = Math.pow(10, Math.floor(Math.log10(step0)));
      let step = mag;
      for (const m of [1, 2, 5, 10]) if (mag * m >= step0) { step = mag * m; break; }
      const out = [];
      for (let v = Math.ceil(a / step) * step; v <= b + 1e-9; v += step) out.push(+v.toFixed(10));
      return out;
    }

    function yDomain() {
      let lo = Infinity, hi = -Infinity;
      const seen = (x, y) => { if (y == null) return; if (x < dom[0] - 1e-9 || x > dom[1] + 1e-9) return;
        if (y < lo) lo = y; if (y > hi) hi = y; };
      // y 域以「選取的序列」為準（強調式設計）；全未選取時退回納入灰線，
      // 避免 y 域塌縮成只剩參考線
      const active = state.series.filter(s => s.color !== 'context');
      const scanned = active.length ? active : state.series;
      for (const s of scanned) for (const p of s.values) seen(p.x, p.y);
      for (const b of state.bands) { for (const p of b.lo) seen(p.x, p.y); for (const p of b.hi) seen(p.x, p.y); }
      for (const r of state.refs) { if (r.y < lo) lo = r.y; if (r.y > hi) hi = r.y; }
      if (!isFinite(lo)) { lo = 0; hi = 1; }
      if (hi === lo) { hi += 1; lo -= 1; }
      const pad = (hi - lo) * 0.08;
      lo = Math.max(0, lo - pad); hi = hi + pad;
      return [lo, hi];
    }

    let ydom = [0, 1];
    const yTo = y => M.t + (1 - (y - ydom[0]) / (ydom[1] - ydom[0])) * (H - M.t - M.b);

    function render() {
      W = Math.max(360, wrap.clientWidth || 800);
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.replaceChildren();
      ydom = yDomain();
      const plot = svgEl('g');
      // 背景（接住滑鼠事件）
      plot.append(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: css('--surface-1') }));
      // 格線 + Y 刻度
      for (const ty of niceTicks(ydom[0], ydom[1], 5)) {
        const py = yTo(ty);
        if (py < M.t - 1 || py > H - M.b + 1) continue;
        plot.append(svgEl('line', { x1: M.l, x2: W - M.r, y1: py, y2: py, stroke: css('--grid'), 'stroke-width': 1 }));
        const t = svgEl('text', { x: M.l - 8, y: py + 4, 'text-anchor': 'end', 'font-size': 11, fill: css('--muted') });
        t.textContent = fmt(ty, 2); plot.append(t);
      }
      // X 刻度（整數年）
      const xt = niceTicks(dom[0], dom[1], Math.min(10, Math.floor((W - M.l - M.r) / 70)))
        .filter(v => Number.isInteger(v));
      for (const tx of xt) {
        const px = xTo(tx);
        const t = svgEl('text', { x: px, y: H - M.b + 18, 'text-anchor': 'middle', 'font-size': 11, fill: css('--muted') });
        t.textContent = String(tx); plot.append(t);
        plot.append(svgEl('line', { x1: px, x2: px, y1: H - M.b, y2: H - M.b + 4, stroke: css('--baseline'), 'stroke-width': 1 }));
      }
      // 基準軸
      plot.append(svgEl('line', { x1: M.l, x2: W - M.r, y1: H - M.b, y2: H - M.b, stroke: css('--baseline'), 'stroke-width': 1 }));
      // Y 軸單位
      if (state.yLabel) {
        const t = svgEl('text', { x: 8, y: M.t - 6, 'text-anchor': 'start', 'font-size': 11, fill: css('--muted') });
        t.textContent = state.yLabel; plot.append(t);
      }
      // 裁切區
      const clipId = 'clip' + (opts.id || '');
      const defs = svgEl('defs');
      const clip = svgEl('clipPath', { id: clipId });
      clip.append(svgEl('rect', { x: M.l, y: M.t, width: Math.max(0, W - M.l - M.r), height: Math.max(0, H - M.t - M.b) }));
      defs.append(clip); plot.append(defs);
      const inner = svgEl('g', { 'clip-path': `url(#${clipId})` });
      plot.append(inner);
      // 區間帶
      for (const b of state.bands) {
        const col = css(b.color);
        const pts = [];
        for (const p of b.hi) if (p.y != null) pts.push([xTo(p.x), yTo(p.y)]);
        const back = [];
        for (const p of b.lo) if (p.y != null) back.push([xTo(p.x), yTo(p.y)]);
        if (pts.length && back.length) {
          const dPath = 'M' + pts.map(p => p.join(',')).join('L') +
            'L' + back.slice().reverse().map(p => p.join(',')).join('L') + 'Z';
          inner.append(svgEl('path', { d: dPath, fill: col, opacity: 0.12 }));
          inner.append(svgEl('path', { d: 'M' + pts.map(p => p.join(',')).join('L'),
            fill: 'none', stroke: col, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
          inner.append(svgEl('path', { d: 'M' + back.map(p => p.join(',')).join('L'),
            fill: 'none', stroke: col, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round', opacity: 0.55 }));
        }
      }
      // 參考線；標籤集中到 rightLabels，與端點標籤共用同一輪防碰撞
      const rightLabels = [];
      for (const r of state.refs) {
        const py = yTo(r.y);
        if (py < M.t || py > H - M.b) continue;
        inner.append(svgEl('line', { x1: M.l, x2: W - M.r, y1: py, y2: py, stroke: css(r.color || '--muted'), 'stroke-width': 1 }));
        rightLabels.push({ y: py, x: W - M.r, text: r.label + (r.showVal === false ? '' : ' ' + fmt(r.y, 1)),
          size: 11, fill: css('--ink-2'), leader: css(r.color || '--muted') });
      }
      // 折線：先畫弱化背景線，再畫選取線
      const ordered = state.series.slice().sort((a, b) => (a.color === 'context' ? 0 : 1) - (b.color === 'context' ? 0 : 1));
      for (const s of ordered) {
        const col = s.color === 'context' ? css('--context') : css(s.color);
        const pts = s.values.filter(p => p.y != null).map(p => [xTo(p.x), yTo(p.y), p.x, p.y]);
        if (!pts.length) continue;
        inner.append(svgEl('path', { d: 'M' + pts.map(p => p[0] + ',' + p[1]).join('L'),
          fill: 'none', stroke: col, 'stroke-width': s.color === 'context' ? 1.25 : 2,
          'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
        if (s.color !== 'context') {
          // 可視域內最後一點 → 端點標記 + 直接標籤
          const vis = pts.filter(p => p[2] >= dom[0] - 1e-9 && p[2] <= dom[1] + 1e-9);
          const last = vis[vis.length - 1] || pts[pts.length - 1];
          inner.append(svgEl('circle', { cx: last[0], cy: last[1], r: 4.5, fill: col,
            stroke: css('--surface-1'), 'stroke-width': 2 }));
          rightLabels.push({ x: Math.min(last[0], W - M.r), y: last[1], text: s.name,
            size: 12, fill: css('--ink'), leader: col });
        }
      }
      // 右側標籤統一防碰撞：參考線與端點同一輪；先往下推、再回推消化底部溢出，
      // 被推離原位者畫該線同色的引導線，讀者才能對回所屬線條
      rightLabels.sort((a, b) => a.y - b.y);
      let prevLab = -Infinity;
      for (const L of rightLabels) { L.ly = Math.max(L.y, prevLab + 14, M.t + 8); prevLab = L.ly; }
      let nextLab = H - M.b + 12;
      for (let i = rightLabels.length - 1; i >= 0; i--) {
        rightLabels[i].ly = Math.min(rightLabels[i].ly, nextLab - 14); nextLab = rightLabels[i].ly;
      }
      for (const L of rightLabels) {
        if (Math.abs(L.ly - L.y) > 6) {
          plot.append(svgEl('line', { x1: L.x + 5, x2: W - M.r + 4, y1: L.y, y2: L.ly - 4,
            stroke: L.leader, 'stroke-width': 1, opacity: 0.8 }));
        }
        const t = svgEl('text', { x: W - M.r + 6, y: L.ly, 'font-size': L.size, fill: L.fill });
        t.textContent = L.text; plot.append(t);
      }
      // 十字準線層
      crossG = svgEl('g');
      plot.append(crossG);
      svg.append(plot);
    }

    // --- 十字準線 + tooltip ---
    let crossG = null;
    function showCross(evt) {
      if (dragging) return;
      const rect = svg.getBoundingClientRect();
      const px = evt.clientX - rect.left, py = evt.clientY - rect.top;
      if (px < M.l || px > W - M.r || py < M.t || py > H - M.b) { hideCross(); return; }
      const xv = xFrom(px);
      // 取最近的資料 X（整數年）
      const xs = opts.xValues;
      let best = xs[0], bd = Infinity;
      for (const v of xs) { const d2 = Math.abs(v - xv); if (d2 < bd) { bd = d2; best = v; } }
      if (best < dom[0] - 0.5 || best > dom[1] + 0.5) { hideCross(); return; }
      const bx = xTo(best);
      crossG.replaceChildren(svgEl('line', { x1: bx, x2: bx, y1: M.t, y2: H - M.b,
        stroke: css('--baseline'), 'stroke-width': 1 }));
      // tooltip 內容：值為主、名稱為輔
      tip.replaceChildren();
      tip.append(el('div', { class: 'tt-title', text: (opts.xTipLabel || '') + best }));
      const rows = opts.tipRows(best);
      for (const r of rows) {
        const key = el('span', { class: 'tt-key' }); key.style.borderTopColor = r.color;
        tip.append(el('div', { class: 'tt-row' }, key,
          el('span', { class: 'tt-val', text: r.value }),
          el('span', { class: 'tt-name', text: r.name })));
        // 準線上的標記點
        if (r.py != null) crossG.append(svgEl('circle', { cx: bx, cy: r.py, r: 4,
          fill: r.color, stroke: css('--surface-1'), 'stroke-width': 2 }));
      }
      if (!rows.length) { hideCross(); return; }
      tip.style.display = 'block';
      const tw = tip.offsetWidth, th2 = tip.offsetHeight;
      let tx2 = px + 14; if (tx2 + tw > W - 4) tx2 = px - tw - 14;
      let ty2 = Math.min(Math.max(4, py - th2 / 2), H - th2 - 4);
      tip.style.left = tx2 + 'px'; tip.style.top = ty2 + 'px';
    }
    function hideCross() { tip.style.display = 'none'; if (crossG) crossG.replaceChildren(); }

    // --- 縮放 / 平移 ---
    const MIN_SPAN = opts.minSpan ?? 2;
    function clampDom() {
      let [a, b] = dom;
      let span = Math.min(Math.max(b - a, MIN_SPAN), full[1] - full[0]);
      if (a < full[0]) a = full[0];
      if (a + span > full[1]) a = full[1] - span;
      dom = [a, a + span];
    }
    function zoomAt(px, factor) {
      const m = xFrom(px);
      let a = m - (m - dom[0]) * factor;
      let b = m + (dom[1] - m) * factor;
      dom = [a, b]; clampDom(); scheduleRender();
    }
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const raw = e.deltaMode === 1 ? e.deltaY * 24 : e.deltaY;
      const factor = Math.exp(Math.max(-120, Math.min(120, raw)) * 0.0022);
      zoomAt(px, factor);
      hideCross();
    }, { passive: false });
    let dragging = false, dragX = 0, dragDom = null, moved = false;
    svg.addEventListener('pointerdown', e => {
      dragging = true; moved = false; dragX = e.clientX; dragDom = dom.slice();
      svg.setPointerCapture(e.pointerId); svg.style.cursor = 'grabbing'; hideCross();
    });
    svg.addEventListener('pointermove', e => {
      if (dragging) {
        const dx = e.clientX - dragX;
        if (Math.abs(dx) > 2) moved = true;
        const span = dragDom[1] - dragDom[0];
        const perPx = span / Math.max(1, W - M.l - M.r);
        dom = [dragDom[0] - dx * perPx, dragDom[1] - dx * perPx];
        clampDom(); scheduleRender();
      } else showCross(e);
    });
    const endDrag = e => { dragging = false; svg.style.cursor = ''; };
    svg.addEventListener('pointerup', endDrag);
    svg.addEventListener('pointercancel', endDrag);
    svg.addEventListener('pointerleave', () => { if (!dragging) hideCross(); });
    svg.addEventListener('dblclick', () => { dom = full.slice(); scheduleRender(); });
    svg.addEventListener('keydown', e => {
      const span = dom[1] - dom[0];
      if (e.key === 'ArrowLeft') { dom = [dom[0] - span * .1, dom[1] - span * .1]; }
      else if (e.key === 'ArrowRight') { dom = [dom[0] + span * .1, dom[1] + span * .1]; }
      else if (e.key === '+' || e.key === '=') { const c = (dom[0] + dom[1]) / 2; dom = [c - span * .4, c + span * .4]; }
      else if (e.key === '-' || e.key === '_') { const c = (dom[0] + dom[1]) / 2; dom = [c - span * .625, c + span * .625]; }
      else if (e.key === '0') { dom = full.slice(); }
      else return;
      e.preventDefault(); clampDom(); scheduleRender();
    });

    let raf = 0;
    function scheduleRender() { if (!raf) raf = requestAnimationFrame(() => { raf = 0; render(); }); }
    if (typeof ResizeObserver !== 'undefined') new ResizeObserver(scheduleRender).observe(wrap);

    return {
      node: wrap,
      update(next) { Object.assign(state, next); scheduleRender(); },
      reset() { dom = full.slice(); scheduleRender(); },
      getState: () => state,
      xToPx: xTo, yToPx: y => yTo(y),
      currentYDomain: () => ydom,
    };
  }

  // ================= 分頁 1：排名總表 =================
  function buildSummary() {
    const s = sections.summary; s.replaceChildren();
    const maxRoe = Math.max(...D.summary.map(r => +r['平均ROE%'] || 0));
    const maxIrr = Math.max(...D.summary.map(r => +r['含息IRR%'] || 0));
    const bar = (v, max) => {
      const box = el('span', { class: 'barbox' });
      const b = el('span', { class: 'bar' });
      b.style.width = Math.max(2, (Math.max(0, v) / max) * 64) + 'px';
      box.append(b, el('span', { text: fmt(v, 1) }));
      return box;
    };
    const hasDetail = new Set(D.roe.stocks.map(x => x.code));
    const cols = [
      { key: '排名', label: '排名', num: true },
      { key: '代號', label: '代號', left: true, render: r => String(r['代號']) },
      { key: '名稱', label: '名稱', left: true, render: r => r['名稱'] + (hasDetail.has(String(r['代號'])) ? ' ›' : '') },
      { key: 'ROE>15%年數', label: 'ROE>15% 年數', render: r => r['ROE>15%年數'] },
      { key: '平均ROE%', label: '平均 ROE%', num: true, render: r => bar(+r['平均ROE%'], maxRoe) },
      { key: '中位ROE%', label: '中位 ROE%', num: true, dec: 1 },
      { key: '最低ROE%', label: '最低 ROE%', num: true, dec: 1 },
      { key: '含息IRR%', label: '含息 IRR%', num: true, render: r => bar(+r['含息IRR%'], maxIrr) },
      { key: '期初價', label: '期初價', num: true, dec: 1 },
      { key: '現價', label: '現價', num: true, dec: 1 },
      { key: '20年累積配息', label: '20 年累積配息', num: true, dec: 1 },
      { key: '便宜價', label: '便宜價', num: true, dec: 1 },
      { key: '合理價', label: '合理價', num: true, dec: 1 },
      { key: '現價/合理價', label: '現價/合理價', num: true, dec: 2 },
    ];
    const card = el('div', { class: 'card' },
      el('h2', { text: '排名總表（' + D.summary.length + ' 檔）' }),
      el('p', { class: 'sub', text: '依 ROE>15% 年數與含息 IRR 排名。點任一列可跳到該檔的股價區間（僅前 10 名有逐年明細）。點表頭可排序。' }),
      sortableTable(cols, D.summary, {
        initKey: '排名',
        onRow: r => {
          const code = String(r['代號']);
          if (hasDetail.has(code)) { pricePick = code; selectTab('price'); }
        },
      }));
    s.append(card);
  }

  // ================= 分頁 2：逐年 ROE =================
  const roeSel = new Map(); // code -> slot index
  ['5904', '2912', '9910'].forEach((c, i) => roeSel.set(c, i));
  let roeShowTable = false;
  let roeChart = null;

  function roeAssignSlot() {
    const used = new Set(roeSel.values());
    for (let i = 0; i < MAX_SEL; i++) if (!used.has(i)) return i;
    return -1;
  }

  function buildRoe() {
    const s = sections.roe; s.replaceChildren();
    const chips = el('div', { class: 'chips' });
    for (const st of D.roe.stocks) {
      const sel = roeSel.has(st.code);
      const chip = el('button', { class: 'chip', 'aria-pressed': String(sel) });
      const key = el('span', { class: 'key' });
      if (sel) key.style.borderTopColor = css(SLOT_VARS[roeSel.get(st.code)]);
      chip.append(key, el('span', { text: st.name + ' ' + st.code }));
      chip.addEventListener('click', () => {
        if (roeSel.has(st.code)) roeSel.delete(st.code);
        else {
          const slot = roeAssignSlot();
          if (slot < 0) { hintEl.textContent = '一次最多比較 ' + MAX_SEL + ' 檔，請先取消一檔。'; return; }
          roeSel.set(st.code, slot);
        }
        hintEl.textContent = HINT;
        buildRoe();
      });
      chips.append(chip);
    }
    const HINT = '滾輪縮放・拖曳平移・雙擊重置';
    const hintEl = el('span', { class: 'hint', text: HINT });
    const tableBtn = el('button', { class: 'btn', text: roeShowTable ? '看圖表' : '看表格',
      onclick: () => { roeShowTable = !roeShowTable; buildRoe(); } });
    const card = el('div', { class: 'card' },
      el('h2', { text: '逐年 ROE（前 10 名，' + D.roe.years[0] + '–' + D.roe.years.at(-1) + '）' }),
      el('p', { class: 'sub', text: '灰線為未選取的其餘個股（背景脈絡）；點選股票加入比較。水平線為 ROE 15% 門檻。' }),
      el('div', { class: 'toolbar' }, chips, el('span', { class: 'gap' }), hintEl, tableBtn));
    s.append(card);

    if (roeShowTable) {
      const cols = [{ key: 'name', label: '股票', left: true, render: r => r.name + ' ' + r.code }];
      D.roe.years.forEach((y, i) => cols.push({ key: 'y' + i, label: String(y), num: true, dec: 1 }));
      const rows = D.roe.stocks.map(st => {
        const o = { name: st.name, code: st.code };
        st.values.forEach((v, i) => o['y' + i] = v);
        return o;
      });
      card.append(sortableTable(cols, rows, {}));
      return;
    }

    const years = D.roe.years;
    const chart = zoomChart({
      id: 'roe',
      xExtent: [years[0] - 0.4, years.at(-1) + 0.4],
      xValues: years,
      xTipLabel: '',
      yLabel: 'ROE %',
      minSpan: 3,
      ariaLabel: '逐年 ROE 互動折線圖，滾輪縮放、拖曳平移',
      tipRows: (year) => {
        const i = years.indexOf(year);
        if (i < 0) return [];
        const out = [];
        for (const [code, slot] of roeSel) {
          const st = D.roe.stocks.find(x => x.code === code);
          if (!st || st.values[i] == null) continue;
          out.push({ name: st.name, value: fmt(st.values[i], 1) + '%',
            color: css(SLOT_VARS[slot]), y: st.values[i] });
        }
        out.sort((a, b) => b.y - a.y);
        for (const o of out) o.py = chart.yToPx(o.y);
        return out;
      },
    });
    roeChart = chart;
    const series = [];
    for (const st of D.roe.stocks) {
      const vals = st.values.map((v, i) => ({ x: years[i], y: v }));
      if (roeSel.has(st.code)) series.push({ name: st.name, color: SLOT_VARS[roeSel.get(st.code)], values: vals });
      else series.push({ name: st.name, color: 'context', values: vals });
    }
    chart.update({ series, bands: [], refs: [{ y: 15, label: 'ROE 15% 門檻', color: '--muted', showVal: false }] });
    card.append(chart.node);
  }

  // ================= 分頁 3：股價區間 =================
  let pricePick = '5904';
  let priceShowTable = false;

  function buildPrice() {
    const s = sections.price; s.replaceChildren();
    const chips = el('div', { class: 'chips' });
    for (const st of D.high.stocks) {
      const chip = el('button', { class: 'chip', 'aria-pressed': String(st.code === pricePick) });
      const key = el('span', { class: 'key' });
      if (st.code === pricePick) key.style.borderTopColor = css('--series-1');
      chip.append(key, el('span', { text: st.name + ' ' + st.code }));
      chip.addEventListener('click', () => { pricePick = st.code; buildPrice(); });
      chips.append(chip);
    }
    const st = D.high.stocks.find(x => x.code === pricePick) || D.high.stocks[0];
    const lo = D.low.stocks.find(x => x.code === st.code);
    const v = valByCode.get(st.code);
    const tableBtn = el('button', { class: 'btn', text: priceShowTable ? '看圖表' : '看表格',
      onclick: () => { priceShowTable = !priceShowTable; buildPrice(); } });
    const card = el('div', { class: 'card' },
      el('h2', { text: '股價區間 — ' + st.name + ' ' + st.code + '（' + D.high.years[0] + '–' + D.high.years.at(-1) + '）' }),
      el('p', { class: 'sub', text: '藍色帶為每年「最低價～最高價」；右側水平線為估值參考（便宜／合理／昂貴）與現價。' }),
      el('div', { class: 'toolbar' }, chips, el('span', { class: 'gap' }),
        el('span', { class: 'hint', text: '滾輪縮放・拖曳平移・雙擊重置' }), tableBtn));
    s.append(card);

    if (priceShowTable) {
      const cols = [
        { key: 'y', label: '年份', num: true, left: true, render: r => String(r.y) },
        { key: 'hi', label: '最高價', num: true, dec: 1 },
        { key: 'lo', label: '最低價', num: true, dec: 1 },
        { key: 'range', label: '振幅（高/低）', num: true, dec: 2 },
      ];
      const rows = D.high.years.map((y, i) => ({
        y, hi: st.values[i], lo: lo.values[i],
        range: (st.values[i] != null && lo.values[i]) ? st.values[i] / lo.values[i] : null,
      }));
      card.append(sortableTable(cols, rows, { initKey: 'y' }));
      return;
    }

    const years = D.high.years;
    const chart = zoomChart({
      id: 'price',
      xExtent: [years[0] - 0.4, years.at(-1) + 0.4],
      xValues: years,
      yLabel: '股價（元）',
      minSpan: 3,
      rightPad: 132,
      ariaLabel: st.name + ' 逐年股價區間圖，滾輪縮放、拖曳平移',
      tipRows: (year) => {
        const i = years.indexOf(year);
        if (i < 0) return [];
        const c1 = css('--series-1');
        const rows = [];
        if (st.values[i] != null) rows.push({ name: '最高', value: fmt(st.values[i], 1), color: c1, y: st.values[i], py: chart.yToPx(st.values[i]) });
        if (lo.values[i] != null) rows.push({ name: '最低', value: fmt(lo.values[i], 1), color: c1, y: lo.values[i], py: chart.yToPx(lo.values[i]) });
        return rows;
      },
    });
    const refs = [];
    if (v) {
      if (typeof v['便宜價(積極)'] === 'number') refs.push({ y: v['便宜價(積極)'], label: '便宜', color: '--good' });
      if (typeof v['合理價'] === 'number') refs.push({ y: v['合理價'], label: '合理', color: '--muted' });
      if (typeof v['昂貴價參考'] === 'number') refs.push({ y: v['昂貴價參考'], label: '昂貴', color: '--serious' });
      if (typeof v['現價'] === 'number') refs.push({ y: v['現價'], label: '現價', color: '--series-1' });
    }
    chart.update({
      series: [],
      bands: [{ color: '--series-1',
        hi: years.map((y, i) => ({ x: y, y: st.values[i] })),
        lo: years.map((y, i) => ({ x: y, y: lo.values[i] })) }],
      refs,
    });
    card.append(chart.node);
  }

  // ================= 分頁 4：估值與建議 =================
  function buildVal() {
    const s = sections.val; s.replaceChildren();
    const statusOf = txt => {
      if (txt.includes('可分批買進')) return { cls: 'buy', icon: '✓' };
      if (txt.includes('合理區間')) return { cls: 'fair', icon: '◆' };
      return { cls: 'wait', icon: '↥' };
    };
    const track = r => {
      const cheap = +r['便宜價(積極)'], fair = +r['合理價'], exp = +r['昂貴價參考'], now = +r['現價'];
      if (![cheap, fair, exp, now].every(Number.isFinite)) return el('span', { text: '–' });
      const a = cheap * 0.8, b = exp * 1.12;
      const raw = x => (x - a) / (b - a) * 100;
      const pos = x => Math.min(100, Math.max(0, raw(x))) + '%';
      const over = raw(now) > 100, under = raw(now) < 0;
      const overNote = over ? '（超出右端，為昂貴價的 ' + fmt(now / exp, 2) + ' 倍）'
        : under ? '（低於左端）' : '';
      const t = el('span', { class: 'track', title: '便宜 ' + fmt(cheap, 1) + '｜合理 ' + fmt(fair, 1) + '｜昂貴 ' + fmt(exp, 1) + '｜現價 ' + fmt(now, 1) + overNote });
      t.append(el('span', { class: 'rail' }));
      for (const x of [cheap, fair, exp]) {
        const tick = el('span', { class: 'tick' }); tick.style.left = pos(x); t.append(tick);
      }
      const pin = el('span', { class: 'pin' + (over ? ' over' : under ? ' under' : '') });
      if (!over && !under) pin.style.left = pos(now);
      t.append(pin);
      return t;
    };
    const cols = [
      { key: '排名', label: '排名', num: true },
      { key: '代號', label: '代號', left: true, render: r => String(r['代號']) },
      { key: '名稱', label: '名稱', left: true, render: r => r['名稱'] },
      { key: '現價', label: '現價', num: true, dec: 1 },
      { key: '目前本益比', label: '本益比', num: true, dec: 1 },
      { key: '目前股價淨值比', label: '股價淨值比', num: true, dec: 1 },
      { key: '目前殖利率%', label: '殖利率%', num: true, dec: 2 },
      { key: '近4季EPS', label: '近 4 季 EPS', num: true, dec: 2 },
      { key: '每股淨值', label: '每股淨值', num: true, dec: 1 },
      { key: '便宜價(積極)', label: '便宜價', num: true, dec: 1 },
      { key: '合理價', label: '合理價', num: true, dec: 1 },
      { key: '昂貴價參考', label: '昂貴價', num: true, dec: 1 },
      { key: '_pos', label: '價格位置', render: track },
      { key: '建議', label: '建議', left: true, render: r => {
        const stt = statusOf(String(r['建議']));
        return el('span', { class: 'status ' + stt.cls },
          el('span', { class: 'dot' }),
          el('span', { text: stt.icon + ' ' + r['建議'] }));
      } },
    ];
    const card = el('div', { class: 'card' },
      el('h2', { text: '估值與買進建議（前 ' + D.valuation.length + ' 名）' }),
      el('p', { class: 'sub', text: '「價格位置」軌道：三格刻度依序為便宜／合理／昂貴價，圓點為現價位置；現價超出量程時以 ▶ 箭頭表示（滑鼠停留可看數值與倍數）。本表為原始檔內容之呈現，非投資建議。' }),
      sortableTable(cols, D.valuation, { initKey: '排名' }));
    s.append(card);
  }

  // ---------- 主渲染 ----------
  function renderAll() {
    const active = TABS.find(t => t.btn.getAttribute('aria-selected') === 'true');
    if (!active) return;
    if (active.id === 'summary') buildSummary();
    if (active.id === 'roe') buildRoe();
    if (active.id === 'price') buildPrice();
    if (active.id === 'val') buildVal();
  }
  selectTab('summary');
})();
</script>
</body>
